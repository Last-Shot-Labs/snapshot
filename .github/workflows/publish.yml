name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout snapshot
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@lastshotlabs"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Use npm 11
        run: npm install -g npm@^11.10.0

      - name: Install snapshot dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          node -e 'const pkg = require("./package.json"); const expected = "v" + pkg.version; const actual = process.env.GITHUB_REF_NAME; if (actual !== expected) { console.error("Tag " + actual + " does not match package version " + expected); process.exit(1); }'

      - name: Check snapshot release
        run: npm run release:check

      - name: Publish snapshot to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
